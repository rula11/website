<!DOCTYPE html>
<html>
<head>
    <title>Website Rula</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: white;
            color: #007BFF;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👁️ Website AI Mata</h1>
        <p>Klasifikasi tekanan bola mata menggunakan gambar mata</p>
        <button onclick="alert('Fitur segera hadir 🚀')">Upload Gambar</button>
    </div>

</body>
</html>
