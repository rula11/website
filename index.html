<!DOCTYPE html>
<html>
<head>
    <title>Website Rula</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            animation: fadeIn 1.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: white;
            color: #007BFF;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: scale(1.1);
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👁️ Website AI Mata</h1>
        <p>Klasifikasi tekanan bola mata menggunakan gambar mata</p>
        <input type="file" id="upload" hidden>
        
        <button onclick="document.getElementById('upload').click()">
            Upload Gambar
        </button>
        
        <p id="file-name"></p>
        
        <script>
        document.getElementById("upload").addEventListener("change", function() {
            const file = this.files[0];
            if (file) {
                document.getElementById("file-name").innerText = "File dipilih: " + file.name;
            }
        });
        </script>
    </div>

</body>
</html>
