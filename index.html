<!DOCTYPE html>
<html>
<head>
    <title>Website Rula</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: white;
            color: #007BFF;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.1);
            background-color: #ddd;
        }

        #preview {
            margin-top: 20px;
            max-width: 300px;
            border-radius: 10px;
            display: none;
        }

        #file-name {
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👁️ Website AI Mata</h1>
        <p>Klasifikasi tekanan bola mata menggunakan gambar mata</p>

        <!-- INPUT FILE (disembunyikan) -->
        <input type="file" id="upload" accept="image/*" hidden>

        <!-- BUTTON -->
        <button onclick="document.getElementById('upload').click()">
            Upload Gambar
        </button>

        <!-- NAMA FILE -->
        <p id="file-name"></p>

        <!-- PREVIEW GAMBAR -->
        <img id="preview">

    </div>

    <script>
        const uploadInput = document.getElementById("upload");
        const fileNameText = document.getElementById("file-name");
        const previewImage = document.getElementById("preview");

        uploadInput.addEventListener("change", function() {
            const file = this.files[0];

            if (file) {
                // tampilkan nama file
                fileNameText.innerText = "File dipilih: " + file.name;

                // tampilkan preview gambar
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    previewImage.style.display = "block";
                }
                reader.readAsDataURL(file);
            }
        });
    </script>

</body>
</html>
